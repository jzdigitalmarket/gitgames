<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labirinto Mortal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #050505;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
            overflow: hidden;
        }
        h1 {
            font-size: 3rem;
            margin: 20px 0 10px;
            background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn {
            padding: 14px 34px;
            margin: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s;
        }
        .btn:hover { transform: scale(1.08); box-shadow: 0 0 20px rgba(255,255,255,0.3); }

        #menu { margin: 30px 0; }
        #game-container { position: relative; display: none; margin: 10px auto; box-shadow: 0 0 70px rgba(255,20,147,0.6); border: 8px solid #222; }

        #hud {
            position: absolute; top: 12px; left: 15px; right: 15px; z-index: 10;
            display: flex; justify-content: space-between; font-size: 1.15rem; text-shadow: 0 0 10px #000;
        }
        canvas { display: block; }

        .screen {
            position: absolute; inset: 0; background: rgba(5,5,20,0.96);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: #0ff;
        }
        input { padding: 12px 16px; font-size: 1.3rem; width: 240px; border-radius: 8px; margin: 15px 0; }
    </style>
</head>
<body>

    <h1>🌌 LABIRINTO MORTAL</h1>

    <div id="menu">
        <h2>Escolha o Modo</h2>
        <button class="btn" style="background:#00cc44" onclick="startGame(16,16,24,'Fácil','neon')">FÁCIL</button>
        <button class="btn" style="background:#ff8800" onclick="startGame(26,26,19,'Médio','neon')">MÉDIO</button>
        <button class="btn" style="background:#ff2222" onclick="startGame(36,36,16,'Expert','neon')">EXPERT</button>
        <button class="btn" style="background:#9900ff" onclick="startInfinite()">MODO INFINITO</button>
        <button class="btn" onclick="showLeaderboard()">🏆 LEADERBOARD</button>
    </div>

    <div id="game-container">
        <div id="hud">
            <div>Nível <span id="level">1</span> • <span id="mode">Fácil</span></div>
            <div>Tempo: <span id="timer">0:00</span></div>
            <div>Recorde: <span id="best">0:00</span></div>
        </div>
        <canvas id="mazeCanvas"></canvas>

        <div id="victory-screen" class="screen">
            <h2>🏆 NÍVEL CONCLUÍDO!</h2>
            <p id="victory-text" style="font-size:1.7rem; margin:20px 0"></p>
            <input type="text" id="player-name" placeholder="Seu nome" maxlength="12">
            <button class="btn" style="background:#00cc66" onclick="saveScoreAndContinue()">Salvar e Continuar</button>
            <button class="btn" onclick="returnToMenu()">Voltar ao Menu</button>
        </div>
    </div>

    <div id="leaderboard-screen" class="screen">
        <h2>🏆 TOP 8 MELHORES</h2>
        <div id="leaderboard-list" style="margin:25px 0; min-width:380px;"></div>
        <button class="btn" onclick="hideLeaderboard()">Voltar</button>
    </div>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        let COLS, ROWS, CELL_SIZE, currentLevel = 1, isInfinite = false, currentTheme = 'neon';
        let grid = [], player = {}, goal = {}, keys = {}, isGameOver = false;
        let startTime, timerInterval, difficultyName = '';
        let playerName = localStorage.getItem('playerName') || 'Jogador';
        let leaderboard = JSON.parse(localStorage.getItem('mazeLeaderboard')) || [];

        const themes = {
            neon: { wall: '#888', player: '#44ddff', goal: '#00ffcc', bg: '#0a0a0a' },
            lava: { wall: '#ff7733', player: '#ffee44', goal: '#ff3366', bg: '#1a0000' },
            cyber: { wall: '#00ffff', player: '#ff00ff', goal: '#ffff00', bg: '#001122' }
        };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(f, d, type='sine', v=0.3){ 
            const o=audioCtx.createOscillator(), g=audioCtx.createGain();
            o.type=type; o.frequency.value=f; g.gain.value=v;
            o.connect(g).connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        class Cell { constructor(r,c){this.r=r;this.c=c;this.walls=[true,true,true,true];this.visited=false;} }

        function index(r,c){ return (r<0||c<0||r>=ROWS||c>=COLS)?-1:c+r*COLS; }

        function generateMaze() {
            grid = []; let stack = [];
            for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++) grid.push(new Cell(r,c));
            let cur = grid[0]; cur.visited=true;
            while(true){
                let neigh = [];
                [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
                    let n=grid[index(cur.r+dr,cur.c+dc)];
                    if(n&&!n.visited) neigh.push(n);
                });
                if(neigh.length){
                    let next=neigh[Math.floor(Math.random()*neigh.length)];
                    next.visited=true;
                    stack.push(cur);
                    let dx=cur.c-next.c, dy=cur.r-next.r;
                    if(dx==1){cur.walls[3]=next.walls[1]=false}
                    if(dx==-1){cur.walls[1]=next.walls[3]=false}
                    if(dy==1){cur.walls[0]=next.walls[2]=false}
                    if(dy==-1){cur.walls[2]=next.walls[0]=false}
                    cur=next;
                } else if(stack.length) cur=stack.pop();
                else break;
            }
        }

        function startGame(cols,rows,size,name,theme){
            isInfinite=false; currentLevel=1; currentTheme=theme; difficultyName=name;
            initLevel(cols,rows,size,name);
        }

        function startInfinite(){
            isInfinite=true; currentLevel=1; currentTheme='cyber'; difficultyName='Infinito';
            initLevel(24,24,20,'Infinito');
        }

        function initLevel(cols,rows,size,name){
            COLS = cols + (currentLevel-1)*2;
            ROWS = rows + (currentLevel-1)*2;
            CELL_SIZE = Math.max(13, size - currentLevel + 1);

            canvas.width = COLS * CELL_SIZE;
            canvas.height = ROWS * CELL_SIZE;

            document.getElementById('menu').style.display='none';
            document.getElementById('game-container').style.display='block';
            document.getElementById('mode').textContent = name;
            document.getElementById('level').textContent = currentLevel;

            player = {x:CELL_SIZE/2, y:CELL_SIZE/2, radius:(CELL_SIZE-8)/2, speed:3.1};
            goal = {x:COLS-1, y:ROWS-1};

            generateMaze();
            if(currentLevel > 3) closeRandomWalls(7 + currentLevel*1.5);

            startTime = Date.now();
            clearInterval(timerInterval);
            timerInterval = setInterval(()=>{ 
                if(isGameOver) return;
                const t = Math.floor((Date.now()-startTime)/1000);
                document.getElementById('timer').textContent = `${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;
            }, 100);

            isGameOver = false;
            document.getElementById('victory-screen').style.display = 'none';
        }

        function closeRandomWalls(n){
            for(let i=0;i<n;i++){
                let cell = grid[Math.floor(Math.random()*grid.length)];
                cell.walls[Math.floor(Math.random()*4)] = true;
            }
        }

        function checkWin(){
            if(Math.floor(player.x/CELL_SIZE) === goal.x && Math.floor(player.y/CELL_SIZE) === goal.y){
                isGameOver = true;
                clearInterval(timerInterval);
                playSound(800,0.15); playSound(1300,0.3); playSound(1800,0.7,'triangle');

                document.getElementById('victory-text').innerHTML = `Nível ${currentLevel} completo!<br>Tempo: ${document.getElementById('timer').textContent}`;
                document.getElementById('victory-screen').style.display = 'flex';
                document.getElementById('player-name').value = playerName;
            }
        }

        function checkWallCollision(nx,ny){
            const r = player.radius + 2;
            const pts = [{x:nx-r,y:ny},{x:nx+r,y:ny},{x:nx,y:ny-r},{x:nx,y:ny+r}];
            for(let p of pts){
                if(p.x<0||p.x>canvas.width||p.y<0||p.y>canvas.height) return true;
                let c = Math.floor(p.x/CELL_SIZE), rr = Math.floor(p.y/CELL_SIZE);
                let cell = grid[index(rr,c)];
                if(!cell) return true;
                let lx = p.x % CELL_SIZE, ly = p.y % CELL_SIZE, b=2.8;
                if(cell.walls[0]&&ly<b) return true;
                if(cell.walls[1]&&lx>CELL_SIZE-b) return true;
                if(cell.walls[2]&&ly>CELL_SIZE-b) return true;
                if(cell.walls[3]&&lx<b) return true;
            }
            return false;
        }

        function update(){
            if(isGameOver) return;
            let dx=0, dy=0;
            if(keys['w']||keys['arrowup']) dy-=player.speed;
            if(keys['s']||keys['arrowdown']) dy+=player.speed;
            if(keys['a']||keys['arrowleft']) dx-=player.speed;
            if(keys['d']||keys['arrowright']) dx+=player.speed;

            if(dx && !checkWallCollision(player.x+dx, player.y)) player.x += dx;
            if(dy && !checkWallCollision(player.x, player.y+dy)) player.y += dy;

            checkWin();
        }

        function draw(){
            const t = themes[currentTheme];
            ctx.fillStyle = t.bg; ctx.fillRect(0,0,canvas.width,canvas.height);

            ctx.strokeStyle = t.wall; ctx.lineWidth = 4;
            grid.forEach(cell=>{
                let x=cell.c*CELL_SIZE, y=cell.r*CELL_SIZE;
                if(cell.walls[0]) ctx.strokeRect(x,y,CELL_SIZE,0);
                if(cell.walls[1]) ctx.strokeRect(x+CELL_SIZE,y,0,CELL_SIZE);
                if(cell.walls[2]) ctx.strokeRect(x,y+CELL_SIZE,CELL_SIZE,0);
                if(cell.walls[3]) ctx.strokeRect(x,y,0,CELL_SIZE);
            });

            ctx.shadowBlur = 30; ctx.shadowColor = t.goal;
            ctx.fillStyle = t.goal;
            ctx.fillRect(goal.x*CELL_SIZE+6, goal.y*CELL_SIZE+6, CELL_SIZE-12, CELL_SIZE-12);

            ctx.shadowBlur = 22; ctx.shadowColor = t.player;
            ctx.fillStyle = t.player;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function gameLoop(){ update(); draw(); requestAnimationFrame(gameLoop); }

        window.addEventListener('keydown', e=> keys[e.key.toLowerCase()]=true);
        window.addEventListener('keyup', e=> keys[e.key.toLowerCase()]=false);

        function saveScoreAndContinue(){
            playerName = document.getElementById('player-name').value.trim() || "Jogador";
            localStorage.setItem('playerName', playerName);

            leaderboard.push({name:playerName, time:Date.now()-startTime, level:currentLevel, mode:difficultyName});
            leaderboard.sort((a,b)=>a.time-b.time);
            leaderboard = leaderboard.slice(0,8);
            localStorage.setItem('mazeLeaderboard', JSON.stringify(leaderboard));

            currentLevel++;
            initLevel(COLS-2, ROWS-2, CELL_SIZE+1, difficultyName);
        }

        function showLeaderboard(){
            document.getElementById('menu').style.display = 'none';
            const div = document.getElementById('leaderboard-list');
            div.innerHTML = leaderboard.map((e,i)=> 
                `<div style="padding:8px 0; border-bottom:1px solid #333">
                    <strong>#${i+1}</strong> ${e.name} — Nvl ${e.level} — ${Math.floor(e.time/60000)}:${Math.floor((e.time%60000)/1000).toString().padStart(2,'0')}
                </div>`).join('');
            document.getElementById('leaderboard-screen').style.display = 'flex';
        }

        function hideLeaderboard(){
            document.getElementById('leaderboard-screen').style.display='none';
            document.getElementById('menu').style.display='block';
        }

        function returnToMenu(){
            document.getElementById('game-container').style.display='none';
            document.getElementById('menu').style.display='block';
        }

        gameLoop();
    </script>
</body>
</html>
