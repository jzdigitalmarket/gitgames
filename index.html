<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labirinto Mortal - Nível Difícil</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
        }

        p {
            margin-bottom: 20px;
            color: #aaa;
        }

        #canvas-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
            border: 4px solid #333;
            background-color: #000;
        }

        canvas {
            display: block;
        }

        .btn-reset {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 1rem;
            background-color: #ff3333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-reset:hover {
            background-color: #cc0000;
            transform: scale(1.05);
        }

        .btn-reset:active {
            transform: scale(0.95);
        }

        /* Tela de Vitória */
        #victory-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #00ff66;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0, 255, 102, 0.7);
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>Labirinto Impossível</h1>
    <p>Use as setas do teclado ou WASD para guiar a esfera até o bloco verde.</p>

    <div id="canvas-container">
        <canvas id="mazeCanvas"></canvas>
        <div id="victory-screen">
            <div>VOCÊ ESCAPOU!</div>
            <button class="btn-reset" onclick="initGame()">Jogar Novamente</button>
        </div>
    </div>

    <button class="btn-reset" onclick="initGame()">Gerar Novo Labirinto</button>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const victoryScreen = document.getElementById('victory-screen');

        // Configurações do Labirinto (Tamanho difícil)
        // Quanto maior o número de linhas/colunas, mais difícil e denso fica o labirinto
        const COLS = 35; 
        const ROWS = 35; 
        const CELL_SIZE = 18; // Tamanho em pixels de cada quadrado

        canvas.width = COLS * CELL_SIZE;
        canvas.height = ROWS * CELL_SIZE;

        let grid = [];
        let currentCell;
        let stack = [];
        
        let player = { x: 0, y: 0 };
        let goal = { x: COLS - 1, y: ROWS - 1 };
        let isGameOver = false;

        // Classe para gerenciar as células do labirinto
        class Cell {
            constructor(r, c) {
                this.r = r;
                this.c = c;
                // Paredes: [topo, direita, baixo, esquerda]
                this.walls = [true, true, true, true];
                this.visited = false;
            }

            checkNeighbors() {
                let neighbors = [];

                let top    = grid[index(this.r - 1, this.c)];
                let right  = grid[index(this.r, this.c + 1)];
                let bottom = grid[index(this.r + 1, this.c)];
                let left   = grid[index(this.r, this.c - 1)];

                if (top && !top.visited) neighbors.push(top);
                if (right && !right.visited) neighbors.push(right);
                if (bottom && !bottom.visited) neighbors.push(bottom);
                if (left && !left.visited) neighbors.push(left);

                if (neighbors.length > 0) {
                    let r = Math.floor(Math.random() * neighbors.length);
                    return neighbors[r];
                } else {
                    return undefined;
                }
            }

            show() {
                let x = this.c * CELL_SIZE;
                let y = this.r * CELL_SIZE;
                ctx.strokeStyle = '#444'; // Cor das paredes internas
                ctx.lineWidth = 2;

                if (this.walls[0]) ctx.strokeRect(x, y, CELL_SIZE, 0); // Topo
                if (this.walls[1]) ctx.strokeRect(x + CELL_SIZE, y, 0, CELL_SIZE); // Direita
                if (this.walls[2]) ctx.strokeRect(x, y + CELL_SIZE, CELL_SIZE, 0); // Baixo
                if (this.walls[3]) ctx.strokeRect(x, y, 0, CELL_SIZE); // Esquerda
            }
        }

        // Auxiliar para transformar matriz 2D em array 1D
        function index(r, c) {
            if (r < 0 || c < 0 || r > ROWS - 1 || c > COLS - 1) return -1;
            return c + r * COLS;
        }

        // Remove as paredes entre duas células adjacentes
        function removeWalls(a, b) {
            let x = a.c - b.c;
            if (x === 1) {
                a.walls[3] = false;
                b.walls[1] = false;
            } else if (x === -1) {
                a.walls[1] = false;
                b.walls[3] = false;
            }
            let y = a.r - b.r;
            if (y === 1) {
                a.walls[0] = false;
                b.walls[2] = false;
            } else if (y === -1) {
                a.walls[2] = false;
                b.walls[0] = false;
            }
        }

        // Inicializa/Gera o jogo
        function initGame() {
            grid = [];
            stack = [];
            player = { x: 0, y: 0 };
            isGameOver = false;
            victoryScreen.style.display = 'none';

            // Cria o grid
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    grid.push(new Cell(r, c));
                }
            }

            // Algoritmo DFS para esculpir o labirinto
            currentCell = grid[0];
            currentCell.visited = true;
            
            while (true) {
                let next = currentCell.checkNeighbors();
                if (next) {
                    next.visited = true;
                    stack.push(currentCell);
                    removeWalls(currentCell, next);
                    currentCell = next;
                } else if (stack.length > 0) {
                    currentCell = stack.pop();
                } else {
                    break; // Labirinto gerado por completo
                }
            }

            draw();
        }

        // Desenha os elementos na tela
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenha o fundo e caminhos
            ctx.fillStyle = '#0d0d0d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenha as paredes
            for (let i = 0; i < grid.length; i++) {
                grid[i].show();
            }

            // Desenha a Saída (Meta)
            ctx.fillStyle = '#00ff66';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00ff66';
            ctx.fillRect(goal.x * CELL_SIZE + 4, goal.y * CELL_SIZE + 4, CELL_SIZE - 8, CELL_SIZE - 8);

            // Desenha o Jogador
            ctx.fillStyle = '#3399ff';
            ctx.shadowColor = '#3399ff';
            ctx.beginPath();
            let radius = (CELL_SIZE - 6) / 2;
            let centerX = player.x * CELL_SIZE + CELL_SIZE / 2;
            let centerY = player.y * CELL_SIZE + CELL_SIZE / 2;
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.fill();

            // Reseta efeitos de sombra para não pesar a renderização
            ctx.shadowBlur = 0;
        }

        // Lógica de Movimentação e Colisão
        function movePlayer(dx, dy, wallIndex, oppWallIndex) {
            if (isGameOver) return;

            let currentIdx = index(player.y, player.x);
            let nextIdx = index(player.y + dy, player.x + dx);

            if (nextIdx !== -1) {
                let currentCell = grid[currentIdx];
                let nextCell = grid[nextIdx];

                // Verifica se há parede impedindo a passagem
                if (!currentCell.walls[wallIndex] && !nextCell.walls[oppWallIndex]) {
                    player.x += dx;
                    player.y += dy;
                    draw();
                    checkWin();
                }
            }
        }

        function checkWin() {
            if (player.x === goal.x && player.y === goal.y) {
                isGameOver = true;
                victoryScreen.style.display = 'flex';
            }
        }

        // Captura de Teclas (WASD e Setas)
        window.addEventListener('keydown', (e) => {
            let key = e.key.toLowerCase();
            
            // Impede o scroll da página com as setas do teclado
            if(["arrowup", "arrowdown", "arrowleft", "arrowright", " "].includes(e.key)) {
                e.preventDefault();
            }

            if (key === 'arrowup' || key === 'w') {
                movePlayer(0, -1, 0, 2); // Move para cima (parede do topo da atual / parede de baixo da próxima)
            } else if (key === 'arrowright' || key === 'd') {
                movePlayer(1, 0, 1, 3);  // Move para direita
            } else if (key === 'arrowdown' || key === 's') {
                movePlayer(0, 1, 2, 0);  // Move para baixo
            } else if (key === 'arrowleft' || key === 'a') {
                movePlayer(-1, 0, 3, 1); // Move para esquerda
            }
        });

        // Inicia o jogo ao carregar a página
        initGame();
    </script>
</body>
</html>
