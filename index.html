<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Labirinto Mortal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080b10; --player: #38bdf8; --player-glow: #0ea5e9;
            --goal: #4ade80; --goal-glow: #22c55e;
            --accent: #f59e0b; --text: #94a3b8; --text-bright: #e2e8f0;
            --hard: #ff4d4d; --hard-glow: #ff0000;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text-bright);
            font-family: 'Share Tech Mono', monospace;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden; position: relative;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 0;
        }
        body.hard-mode::after {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(255,30,30,0.12) 100%);
            pointer-events: none; z-index: 1; animation: vignetteFlicker 3s ease-in-out infinite;
        }
        @keyframes vignetteFlicker { 0%,100%{opacity:1} 50%{opacity:0.6} }
        header { position: relative; z-index: 10; text-align: center; padding: 12px 20px 4px; width: 100%; }
        h1 {
            font-family: 'Orbitron', sans-serif; font-size: clamp(1.1rem, 4vw, 1.6rem);
            font-weight: 900; letter-spacing: 4px; color: var(--player);
            text-shadow: 0 0 20px var(--player-glow), 0 0 60px rgba(14,165,233,0.3);
            text-transform: uppercase; transition: color 0.5s, text-shadow 0.5s;
        }
        body.hard-mode h1 { color: var(--hard); text-shadow: 0 0 20px var(--hard-glow), 0 0 60px rgba(255,0,0,0.3); }
        .subtitle { font-size: 0.6rem; color: var(--text); letter-spacing: 2px; margin-top: 2px; }

        .mode-toggle {
            position: relative; z-index: 10; display: flex; align-items: center; gap: 0;
            margin: 6px 0 3px; border: 1px solid rgba(14,165,233,0.25); border-radius: 6px; overflow: hidden;
        }
        .mode-btn {
            padding: 6px 18px; font-family: 'Orbitron', sans-serif; font-size: 0.62rem;
            font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
            border: none; background: transparent; color: var(--text); cursor: pointer; transition: all 0.2s;
        }
        .mode-btn.active { background: rgba(56,189,248,0.15); color: var(--player); }
        .mode-btn.active.hard { background: rgba(255,77,77,0.2); color: var(--hard); animation: hardPulse 1.5s ease-in-out infinite; }
        @keyframes hardPulse { 0%,100%{background:rgba(255,77,77,0.2)} 50%{background:rgba(255,77,77,0.35)} }
        .mode-divider { width: 1px; height: 28px; background: rgba(14,165,233,0.2); }

        .hud {
            display: flex; gap: 12px; align-items: center; justify-content: center;
            padding: 5px 20px; position: relative; z-index: 10; flex-wrap: wrap;
        }
        .hud-item {
            display: flex; flex-direction: column; align-items: center;
            background: rgba(14,165,233,0.05); border: 1px solid rgba(14,165,233,0.15);
            border-radius: 6px; padding: 4px 10px; min-width: 65px; font-size: 0.5rem;
        }
        body.hard-mode .hud-item { border-color: rgba(255,77,77,0.2); background: rgba(255,77,77,0.05); }
        .hud-label { color: var(--text); letter-spacing: 2px; text-transform: uppercase; }
        .hud-value { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--player); margin-top: 1px; }
        #timer { color: var(--accent); } #best-time-val { color: var(--goal); }

        .btn-row { position: relative; z-index: 10; display: flex; gap: 8px; margin: 6px 0; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 8px 20px; font-family: 'Orbitron', sans-serif; font-size: 0.68rem;
            font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
            border: 1px solid var(--player); background: transparent; color: var(--player);
            border-radius: 4px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
        }
        .btn::before { content: ''; position: absolute; inset: 0; background: var(--player); transform: translateX(-100%); transition: transform 0.2s; z-index: -1; }
        .btn:hover { color: var(--bg); box-shadow: 0 0 20px var(--player-glow); }
        .btn:hover::before { transform: translateX(0); }
        .btn:active { transform: scale(0.97); }

        #game-wrap { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; flex: 1; }
        #canvas-container {
            position: relative; border: 1px solid rgba(14,165,233,0.2); border-radius: 4px;
            box-shadow: 0 0 0 1px rgba(14,165,233,0.05), 0 0 40px rgba(14,165,233,0.1), inset 0 0 40px rgba(0,0,0,0.5);
            overflow: hidden; transition: border-color 0.4s, box-shadow 0.4s;
        }
        body.hard-mode #canvas-container {
            border-color: rgba(255,77,77,0.35);
            box-shadow: 0 0 0 1px rgba(255,77,77,0.08), 0 0 40px rgba(255,77,77,0.2), inset 0 0 40px rgba(0,0,0,0.5);
        }
        canvas { display: block; }
        #minimap { position: absolute; top: 8px; right: 8px; border: 1px solid rgba(14,165,233,0.3); border-radius: 3px; background: rgba(8,11,16,0.85); }
        #canvas-container::after {
            content: ''; position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
            pointer-events: none;
        }

        .overlay { display: none; position: absolute; inset: 0; background: rgba(8,11,16,0.92); backdrop-filter: blur(8px); flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 100; }
        .overlay.active { display: flex; }
        .overlay-title { font-family: 'Orbitron', sans-serif; font-size: clamp(1.3rem, 5vw, 2rem); font-weight: 900; letter-spacing: 3px; animation: pulseGlow 2s ease-in-out infinite; }
        .overlay-title.win { color: var(--goal); text-shadow: 0 0 30px var(--goal-glow); }
        @keyframes pulseGlow { 0%,100%{opacity:1} 50%{opacity:0.7} }

        .overlay-stats { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .stat-box { background: rgba(14,165,233,0.08); border: 1px solid rgba(14,165,233,0.2); border-radius: 8px; padding: 7px 14px; text-align: center; }
        .stat-box .label { font-size: 0.5rem; color: var(--text); letter-spacing: 2px; }
        .stat-box .val { font-family: 'Orbitron', sans-serif; font-size: 1rem; color: var(--text-bright); margin-top: 1px; }
        .overlay-hint { font-size: 0.65rem; color: var(--text); letter-spacing: 1px; }

        #hard-warning { display: none; position: absolute; inset: 0; background: rgba(255,0,0,0.08); pointer-events: none; z-index: 50; animation: warnFlash 0.35s ease-out forwards; }
        @keyframes warnFlash { 0%{opacity:1} 100%{opacity:0} }

        #dpad { display: none; position: relative; z-index: 10; width: 130px; height: 130px; margin: 6px auto; user-select: none; }
        .dpad-btn { position: absolute; width: 40px; height: 40px; background: rgba(14,165,233,0.1); border: 1px solid rgba(14,165,233,0.3); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--player); font-size: 16px; transition: background 0.1s; }
        .dpad-btn:active, .dpad-btn.pressed { background: rgba(14,165,233,0.35); }
        .dpad-up { top: 0; left: 50%; transform: translateX(-50%); }
        .dpad-down { bottom: 0; left: 50%; transform: translateX(-50%); }
        .dpad-left { top: 50%; left: 0; transform: translateY(-50%); }
        .dpad-right { top: 50%; right: 0; transform: translateY(-50%); }
        .dpad-center { top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(14,165,233,0.05); font-size: 9px; color: var(--text); }
        @media (max-width: 500px) { #dpad { display: block; } }

        /* Audio player */
        .audio-player {
            position: relative; z-index: 10;
            background: rgba(14,165,233,0.08);
            border: 1px solid rgba(14,165,233,0.2);
            border-radius: 6px;
            padding: 8px 14px;
            margin: 6px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 400px;
            flex-wrap: wrap;
            justify-content: center;
        }
        body.hard-mode .audio-player {
            background: rgba(255,77,77,0.08);
            border-color: rgba(255,77,77,0.2);
        }
        .audio-btn {
            padding: 6px 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            border: 1px solid rgba(14,165,233,0.3);
            background: rgba(14,165,233,0.1);
            color: var(--text);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .audio-btn:hover {
            background: rgba(14,165,233,0.25);
            border-color: rgba(14,165,233,0.5);
        }
        .audio-btn.active {
            background: rgba(56,189,248,0.3);
            color: var(--player);
            border-color: rgba(56,189,248,0.5);
        }
        body.hard-mode .audio-btn.active {
            background: rgba(255,77,77,0.3);
            color: var(--hard);
            border-color: rgba(255,77,77,0.5);
        }
        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #volumeSlider {
            width: 80px;
            height: 3px;
            border-radius: 2px;
            background: rgba(14,165,233,0.2);
            outline: none;
            cursor: pointer;
        }
        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--player);
            cursor: pointer;
        }
        #volumeSlider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--player);
            border: none;
            cursor: pointer;
        }
        .track-label {
            font-size: 0.6rem;
            color: var(--text);
            letter-spacing: 1px;
            text-transform: uppercase;
            min-width: 100px;
            text-align: center;
        }
        #audioFileInput {
            display: none;
        }

        footer { position: relative; z-index: 10; padding: 6px; font-size: 0.55rem; color: var(--text); letter-spacing: 1px; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>⬡ Labirinto Mortal</h1>
    <div class="subtitle" id="subtitle">[ nível normal ]</div>
</header>

<div class="mode-toggle">
    <button class="mode-btn active" id="btn-normal">⬡ NORMAL</button>
    <div class="mode-divider"></div>
    <button class="mode-btn" id="btn-hard">☠ HARD</button>
</div>

<div class="hud">
    <div class="hud-item">
        <span class="hud-label">Tempo</span>
        <span class="hud-value" id="timer">00:00.00</span>
    </div>
    <div class="hud-item">
        <span class="hud-label">Recorde</span>
        <span class="hud-value" id="best-time-val">--:--</span>
    </div>
    <div class="hud-item">
        <span class="hud-label">Partidas</span>
        <span class="hud-value" id="runs-val">0</span>
    </div>
    <div class="hud-item" id="hud-walls" style="display:none">
        <span class="hud-label">Fechadas</span>
        <span class="hud-value" id="walls-val" style="color:var(--hard)">0</span>
    </div>
</div>

<div class="btn-row">
    <button class="btn" id="new-maze-btn">↺ NOVO</button>
</div>

<!-- Audio player -->
<div class="audio-player">
    <div class="track-label" id="track-name">🎵 Normal</div>
    <button class="audio-btn active" id="btn-play">▶ Play</button>
    <button class="audio-btn" id="btn-pause">⏸ Pause</button>
    <div class="volume-control">
        <span style="font-size:0.6rem;color:var(--text)">🔊</span>
        <input type="range" id="volumeSlider" min="0" max="100" value="50">
    </div>
    <button class="audio-btn" id="btn-upload">📁 Upload</button>
</div>

<input type="file" id="audioFileInput" accept="audio/*">

<div id="game-wrap">
    <div id="canvas-container">
        <canvas id="mazeCanvas"></canvas>
        <canvas id="minimap"></canvas>
        <div id="hard-warning"></div>

        <div class="overlay active" id="start-screen">
            <div class="overlay-title">LABIRINTO<br>MORTAL</div>
            <div class="overlay-hint">[ pressione qualquer tecla ou toque ]</div>
            <button class="btn" id="start-btn">INICIAR</button>
        </div>

        <div class="overlay" id="victory-screen">
            <div class="overlay-title win">ESCAPOU!</div>
            <div class="overlay-stats">
                <div class="stat-box">
                    <div class="label">Tempo</div>
                    <div class="val" id="finish-time">--</div>
                </div>
                <div class="stat-box">
                    <div class="label">Recorde</div>
                    <div class="val" id="finish-best">--</div>
                </div>
            </div>
            <button class="btn" id="replay-btn">JOGAR NOVAMENTE</button>
        </div>
    </div>

    <div id="dpad">
        <div class="dpad-btn dpad-up" data-dir="up">▲</div>
        <div class="dpad-btn dpad-down" data-dir="down">▼</div>
        <div class="dpad-btn dpad-left" data-dir="left">◀</div>
        <div class="dpad-btn dpad-right" data-dir="right">▶</div>
        <div class="dpad-btn dpad-center" id="reset-dpad">↺</div>
    </div>
</div>

<footer>WASD / SETAS para mover · guie a esfera até o bloco verde</footer>

<script>
const canvas = document.getElementById('mazeCanvas'), ctx = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimap'), mmCtx = mmCanvas.getContext('2d');

// ─── Audio Setup ──────────────────────────────────────────────────────────────
const audioElement = new Audio();
audioElement.loop = true;
audioElement.volume = 0.5;

// Default tracks (using placeholder data URIs with silence)
const TRACKS = {
    normal: 'data:audio/wav;base64,UklGRiYAAABXQVZFZm10IBAAAAABAAEAQB8AAAB9AAACABAAZGF0YQIAAAAAAA==',
    hard: 'data:audio/wav;base64,UklGRiYAAABXQVZFZm10IBAAAAABAAEAQB8AAAB9AAACABAAZGF0YQIAAAAAAA=='
};

let currentTrack = 'normal';
let isPlaying = false;

function setTrack(trackKey) {
    const wasPlaying = isPlaying;
    if (isPlaying) audioElement.pause();
    
    currentTrack = trackKey;
    const trackName = trackKey === 'normal' ? 'Normal' : 'HARD - Crisis Mode';
    document.getElementById('track-name').textContent = '🎵 ' + trackName;
    audioElement.src = TRACKS[trackKey];
    
    if (wasPlaying) {
        setTimeout(() => {
            audioElement.play().then(() => {
                isPlaying = true;
                document.getElementById('btn-play').classList.add('active');
                document.getElementById('btn-pause').classList.remove('active');
            }).catch(e => console.log('Auto-play failed:', e));
        }, 100);
    }
}

document.getElementById('btn-play').addEventListener('click', () => {
    if (!isPlaying) {
        const playPromise = audioElement.play();
        if (playPromise !== undefined) {
            playPromise.then(() => {
                isPlaying = true;
                document.getElementById('btn-play').classList.add('active');
                document.getElementById('btn-pause').classList.remove('active');
            }).catch(e => console.log('Play failed:', e));
        }
    }
});

document.getElementById('btn-pause').addEventListener('click', () => {
    if (isPlaying) {
        audioElement.pause();
        isPlaying = false;
        document.getElementById('btn-play').classList.remove('active');
        document.getElementById('btn-pause').classList.add('active');
    }
});

document.getElementById('volumeSlider').addEventListener('input', (e) => {
    audioElement.volume = e.target.value / 100;
});

document.getElementById('btn-upload').addEventListener('click', () => {
    document.getElementById('audioFileInput').click();
});

document.getElementById('audioFileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const dataUrl = event.target.result;
            TRACKS.custom = dataUrl;
            currentTrack = 'custom';
            document.getElementById('track-name').textContent = '🎵 ' + file.name.substring(0, 20);
            audioElement.src = dataUrl;
            if (isPlaying) {
                audioElement.play().then(() => {
                    console.log('Audio playing');
                }).catch(e => console.log('Play failed:', e));
            }
        };
        reader.readAsDataURL(file);
    }
});

// Update track when mode changes
function updateAudioForMode() {
    if (isHardMode) {
        if (currentTrack !== 'hard' && currentTrack !== 'custom') setTrack('hard');
    } else {
        if (currentTrack !== 'normal' && currentTrack !== 'custom') setTrack('normal');
    }
}


const COLS = 31, ROWS = 31, CELL_SIZE = 18;
canvas.width = COLS * CELL_SIZE;
canvas.height = ROWS * CELL_SIZE;
const MM_SCALE = 3;
mmCanvas.width = COLS * MM_SCALE;
mmCanvas.height = ROWS * MM_SCALE;
mmCanvas.style.width = COLS * MM_SCALE + 'px';
mmCanvas.style.height = ROWS * MM_SCALE + 'px';

let grid = [], isGameOver = false, gameStarted = false;
let timerInterval = null, startTime = 0, elapsedMs = 0;
let bestNormal = Infinity, bestHard = Infinity, runs = 0;
let isHardMode = false, dynamicWalls = [];

const goal = { col: COLS - 1, row: ROWS - 1 };
const player = { x: CELL_SIZE / 2, y: CELL_SIZE / 2, vx: 0, vy: 0, radius: (CELL_SIZE - 5) / 2, speed: 3.2, friction: 0.72, align: 1.8 };
const trail = [];
const MAX_TRAIL = 60;
const keys = {}, dpadState = { up: false, down: false, left: false, right: false };

class Cell {
    constructor(r, c) { this.r = r; this.c = c; this.walls = [true, true, true, true]; this.visited = false; }
    neighbors() { return [[-1,0],[0,1],[1,0],[0,-1]].map(([dr,dc]) => gridAt(this.r+dr, this.c+dc)).filter(c => c && !c.visited); }
}

function gridAt(r, c) { if (r < 0 || c < 0 || r >= ROWS || c >= COLS) return null; return grid[r * COLS + c]; }
function removeWalls(a, b) {
    const dr = b.r - a.r, dc = b.c - a.c;
    if (dr === -1) { a.walls[0] = false; b.walls[2] = false; }
    if (dr === 1) { a.walls[2] = false; b.walls[0] = false; }
    if (dc === 1) { a.walls[1] = false; b.walls[3] = false; }
    if (dc === -1) { a.walls[3] = false; b.walls[1] = false; }
}

function generateMaze() {
    grid = [];
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) grid.push(new Cell(r, c));
    let cur = grid[0];
    cur.visited = true;
    const stack = [];
    while (true) {
        const nb = cur.neighbors();
        if (nb.length) { const next = nb[Math.floor(Math.random() * nb.length)]; next.visited = true; stack.push(cur); removeWalls(cur, next); cur = next; }
        else if (stack.length) cur = stack.pop();
        else break;
    }
}

function setupDynamicWalls() {
    dynamicWalls = [];
    const passages = [];
    for (const cell of grid) {
        if ((cell.r === 0 && cell.c === 0) || (cell.r === ROWS-1 && cell.c === COLS-1)) continue;
        const dirs = [[-1,0,0],[0,1,1],[1,0,2],[0,-1,3]];
        for (const [dr,dc,side] of dirs) {
            const nb = gridAt(cell.r+dr, cell.c+dc);
            if (!nb || cell.walls[side]) continue;
            if (Math.abs(cell.r) + Math.abs(cell.c) < 3 || Math.abs(cell.r - (ROWS-1)) + Math.abs(cell.c - (COLS-1)) < 3) continue;
            if (side === 0 || side === 3) continue;
            passages.push({ cell, nb, side, mirrorSide: [[2,3],[3,2],[0,1],[1,0]][side] });
        }
    }
    for (let i = passages.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [passages[i], passages[j]] = [passages[j], passages[i]]; }
    for (const p of passages.slice(0, Math.min(15, passages.length))) {
        const dw = { cell: p.cell, nb: p.nb, side: p.side, mirrorSide: p.mirrorSide, closed: false };
        dynamicWalls.push(dw);
        scheduleToggle(dw);
    }
    document.getElementById('hud-walls').style.display = '';
}

function scheduleToggle(dw) {
    setTimeout(() => {
        if (isGameOver) return;
        const pc = Math.floor(player.x / CELL_SIZE), pr = Math.floor(player.y / CELL_SIZE);
        if ((pc === dw.cell.c && pr === dw.cell.r) || (pc === dw.nb.c && pr === dw.nb.r)) { scheduleToggle(dw); return; }
        dw.closed = !dw.closed;
        dw.cell.walls[dw.side] = dw.closed;
        dw.nb.walls[dw.mirrorSide] = dw.closed;
        if (dw.closed && Math.abs(pc - dw.cell.c) + Math.abs(pr - dw.cell.r) <= 3) flashWarning();
        updateWallsCount();
        scheduleToggle(dw);
    }, 2000 + Math.random() * 2000);
}

function clearDynamicWalls() { dynamicWalls = []; document.getElementById('hud-walls').style.display = 'none'; }
function updateWallsCount() { document.getElementById('walls-val').textContent = dynamicWalls.filter(dw => dw.closed).length; }
function flashWarning() { const el = document.getElementById('hard-warning'); el.style.display = 'block'; setTimeout(() => { el.style.display = 'none'; }, 400); }

function collidesAt(nx, ny) {
    const r = player.radius - 0.5;
    const probes = [[nx-r,ny],[nx+r,ny],[nx,ny-r],[nx,ny+r],[nx-r*0.7,ny-r*0.7],[nx+r*0.7,ny-r*0.7],[nx-r*0.7,ny+r*0.7],[nx+r*0.7,ny+r*0.7]];
    for (const [px,py] of probes) {
        if (px < 0 || px > canvas.width || py < 0 || py > canvas.height) return true;
        const cc = Math.floor(px / CELL_SIZE), cr = Math.floor(py / CELL_SIZE);
        const cell = gridAt(cr, cc);
        if (!cell) return true;
        const lx = px % CELL_SIZE, ly = py % CELL_SIZE, buf = 1.2;
        if (cell.walls[0] && ly < buf) return true;
        if (cell.walls[1] && lx > CELL_SIZE - buf) return true;
        if (cell.walls[2] && ly > CELL_SIZE - buf) return true;
        if (cell.walls[3] && lx < buf) return true;
    }
    return false;
}

function update() {
    if (isGameOver || !gameStarted) return;
    const up = keys['arrowup'] || keys['w'] || dpadState.up;
    const down = keys['arrowdown'] || keys['s'] || dpadState.down;
    const left = keys['arrowleft'] || keys['a'] || dpadState.left;
    const right = keys['arrowright'] || keys['d'] || dpadState.right;
    let ax = 0, ay = 0;
    if (left) ax -= player.speed;
    if (right) ax += player.speed;
    if (up) ay -= player.speed;
    if (down) ay += player.speed;
    if (ax !== 0 && ay !== 0) { ax *= 0.707; ay *= 0.707; }
    player.vx = player.vx * player.friction + ax * (1 - player.friction);
    player.vy = player.vy * player.friction + ay * (1 - player.friction);
    const curC = Math.floor(player.x / CELL_SIZE), curR = Math.floor(player.y / CELL_SIZE);
    const centerX = curC * CELL_SIZE + CELL_SIZE / 2, centerY = curR * CELL_SIZE + CELL_SIZE / 2;
    const threshold = CELL_SIZE * 0.45;
    if (ax !== 0 && ay === 0) { const diff = centerY - player.y; if (Math.abs(diff) < threshold) player.vy += diff * 0.18 * player.align; }
    if (ay !== 0 && ax === 0) { const diff = centerX - player.x; if (Math.abs(diff) < threshold) player.vx += diff * 0.18 * player.align; }
    const spd = Math.hypot(player.vx, player.vy);
    if (spd > player.speed * 1.5) { player.vx = (player.vx / spd) * player.speed * 1.5; player.vy = (player.vy / spd) * player.speed * 1.5; }
    const nx = player.x + player.vx, ny = player.y + player.vy;
    if (!collidesAt(nx, player.y)) player.x = nx; else player.vx *= -0.1;
    if (!collidesAt(player.x, ny)) player.y = ny; else player.vy *= -0.1;
    trail.push({ x: player.x, y: player.y });
    if (trail.length > MAX_TRAIL) trail.shift();
    const pc = Math.floor(player.x / CELL_SIZE), pr = Math.floor(player.y / CELL_SIZE);
    if (pc === goal.col && pr === goal.row) triggerVictory();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#080b10';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < trail.length; i++) {
        const a = (i / trail.length) * 0.5;
        ctx.beginPath();
        ctx.arc(trail[i].x, trail[i].y, player.radius * 0.55, 0, Math.PI * 2);
        ctx.fillStyle = isHardMode ? `rgba(255,100,100,${a * 0.35})` : `rgba(56,189,248,${a * 0.4})`;
        ctx.fill();
    }
    const dynSet = new Set();
    if (isHardMode) for (const dw of dynamicWalls) if (dw.closed) dynSet.add(`${dw.cell.r},${dw.cell.c},${dw.side}`);
    ctx.lineWidth = 1.5;
    for (const cell of grid) {
        const x = cell.c * CELL_SIZE, y = cell.r * CELL_SIZE;
        const drawWall = (side, x1, y1, x2, y2) => {
            if (!cell.walls[side]) return;
            const isDyn = dynSet.has(`${cell.r},${cell.c},${side}`);
            if (isDyn) {
                ctx.save();
                const t = Date.now() / 500;
                const flicker = 0.7 + 0.3 * Math.sin(t + cell.r + cell.c);
                ctx.shadowBlur = 8 * flicker;
                ctx.shadowColor = '#ff3333';
                ctx.strokeStyle = `rgba(255,60,60,${flicker})`;
                ctx.lineWidth = 2.5;
                ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
                ctx.restore();
                ctx.lineWidth = 1.5;
            } else {
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#1e3a5f';
                ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
            }
        };
        drawWall(0, x, y, x + CELL_SIZE, y);
        drawWall(1, x + CELL_SIZE, y, x + CELL_SIZE, y + CELL_SIZE);
        drawWall(2, x, y + CELL_SIZE, x + CELL_SIZE, y + CELL_SIZE);
        drawWall(3, x, y, x, y + CELL_SIZE);
    }
    const gx = goal.col * CELL_SIZE, gy = goal.row * CELL_SIZE;
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 300);
    ctx.shadowBlur = 20 * pulse;
    ctx.shadowColor = '#22c55e';
    ctx.fillStyle = `rgba(74,222,128,${0.6 + 0.4 * pulse})`;
    ctx.beginPath();
    ctx.roundRect(gx + 3, gy + 3, CELL_SIZE - 6, CELL_SIZE - 6, 3);
    ctx.fill();
    const spd = Math.hypot(player.vx, player.vy);
    const playerColor = isHardMode ? '#ff6b6b' : '#38bdf8';
    const playerGlow = isHardMode ? '#ff2222' : '#0ea5e9';
    ctx.shadowBlur = 15 + spd * 3;
    ctx.shadowColor = playerGlow;
    ctx.fillStyle = playerColor;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(player.x - player.radius * 0.3, player.y - player.radius * 0.3, player.radius * 0.35, 0, Math.PI * 2);
    ctx.fill();
    mmCtx.clearRect(0, 0, mmCanvas.width, mmCanvas.height);
    mmCtx.fillStyle = 'rgba(8,11,16,0.95)';
    mmCtx.fillRect(0, 0, mmCanvas.width, mmCanvas.height);
    for (const cell of grid) {
        const x = cell.c * MM_SCALE, y = cell.r * MM_SCALE;
        const drawMMWall = (side, x1, y1, x2, y2) => {
            if (!cell.walls[side]) return;
            const isDyn = dynSet.has(`${cell.r},${cell.c},${side}`);
            mmCtx.strokeStyle = isDyn ? 'rgba(255,80,80,0.9)' : 'rgba(37,99,235,0.6)';
            mmCtx.lineWidth = isDyn ? 1.2 : 0.5;
            mmCtx.beginPath(); mmCtx.moveTo(x1,y1); mmCtx.lineTo(x2,y2); mmCtx.stroke();
        };
        drawMMWall(0, x, y, x + MM_SCALE, y);
        drawMMWall(1, x + MM_SCALE, y, x + MM_SCALE, y + MM_SCALE);
        drawMMWall(2, x, y + MM_SCALE, x + MM_SCALE, y + MM_SCALE);
        drawMMWall(3, x, y, x, y + MM_SCALE);
    }
    mmCtx.fillStyle = '#4ade80';
    mmCtx.fillRect(goal.col * MM_SCALE + 0.5, goal.row * MM_SCALE + 0.5, MM_SCALE - 1, MM_SCALE - 1);
    const mx = (player.x / CELL_SIZE) * MM_SCALE, my = (player.y / CELL_SIZE) * MM_SCALE;
    mmCtx.fillStyle = isHardMode ? '#ff6b6b' : '#38bdf8';
    mmCtx.beginPath();
    mmCtx.arc(mx, my, MM_SCALE * 0.7, 0, Math.PI * 2);
    mmCtx.fill();
}

function formatTime(ms) { const s = Math.floor(ms / 1000), cs = Math.floor((ms % 1000) / 10); return String(Math.floor(s / 60)).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0') + '.' + String(cs).padStart(2,'0'); }
function startTimer() { clearInterval(timerInterval); startTime = Date.now(); timerInterval = setInterval(() => { elapsedMs = Date.now() - startTime; document.getElementById('timer').textContent = formatTime(elapsedMs); }, 50); }
function stopTimer() { clearInterval(timerInterval); elapsedMs = Date.now() - startTime; }

function initGame() {
    clearDynamicWalls();
    generateMaze();
    isGameOver = false;
    player.x = CELL_SIZE / 2;
    player.y = CELL_SIZE / 2;
    player.vx = 0;
    player.vy = 0;
    trail.length = 0;
    document.getElementById('victory-screen').classList.remove('active');
    document.getElementById('start-screen').classList.remove('active');
    if (isHardMode) setupDynamicWalls();
    if (gameStarted) startTimer();
}

function startGame() { gameStarted = true; document.getElementById('start-screen').classList.remove('active'); initGame(); startTimer(); }

function triggerVictory() {
    if (isGameOver) return;
    isGameOver = true;
    stopTimer();
    clearDynamicWalls();
    runs++;
    const best = isHardMode ? bestHard : bestNormal;
    if (elapsedMs < best) (isHardMode ? (bestHard = elapsedMs) : (bestNormal = elapsedMs));
    document.getElementById('finish-time').textContent = formatTime(elapsedMs);
    document.getElementById('finish-best').textContent = (isHardMode ? bestHard : bestNormal) < Infinity ? formatTime(isHardMode ? bestHard : bestNormal) : '--';
    document.getElementById('best-time-val').textContent = (isHardMode ? bestHard : bestNormal) < Infinity ? formatTime(isHardMode ? bestHard : bestNormal) : '--:--';
    document.getElementById('runs-val').textContent = runs;
    document.getElementById('victory-screen').classList.add('active');
}

window.addEventListener('keydown', e => { const k = e.key.toLowerCase(); keys[k] = true; if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key)) e.preventDefault(); if (!gameStarted) startGame(); });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

document.querySelectorAll('.dpad-btn[data-dir]').forEach(btn => {
    const dir = btn.dataset.dir;
    const setDir = (val) => { dpadState[dir] = val; btn.classList.toggle('pressed', val); if (val && !gameStarted) startGame(); };
    btn.addEventListener('touchstart', e => { e.preventDefault(); setDir(true); }, { passive: false });
    btn.addEventListener('touchend', e => { e.preventDefault(); setDir(false); }, { passive: false });
    btn.addEventListener('mousedown', () => setDir(true));
    btn.addEventListener('mouseup', () => setDir(false));
    btn.addEventListener('mouseleave', () => setDir(false));
});

document.getElementById('reset-dpad').addEventListener('click', () => initGame());
document.getElementById('new-maze-btn').addEventListener('click', () => { if (!gameStarted) startGame(); else initGame(); });
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('replay-btn').addEventListener('click', () => { runs++; document.getElementById('runs-val').textContent = runs; initGame(); startTimer(); });
document.getElementById('start-screen').addEventListener('click', startGame);

document.getElementById('btn-normal').addEventListener('click', () => {
    isHardMode = false;
    document.body.classList.remove('hard-mode');
    document.getElementById('btn-normal').classList.add('active');
    document.getElementById('btn-hard').classList.remove('active', 'hard');
    document.getElementById('subtitle').textContent = '[ nível normal ]';
    clearDynamicWalls();
    updateAudioForMode();
    initGame();
});

document.getElementById('btn-hard').addEventListener('click', () => {
    isHardMode = true;
    document.body.classList.add('hard-mode');
    document.getElementById('btn-hard').classList.add('active', 'hard');
    document.getElementById('btn-normal').classList.remove('active');
    document.getElementById('subtitle').textContent = '[ nível crítico — paredes mutáveis ]';
    updateAudioForMode();
    initGame();
});

let touchStart = null;
canvas.addEventListener('touchstart', e => { touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; if (!gameStarted) startGame(); }, { passive: true });
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!touchStart) return; const dx = e.touches[0].clientX - touchStart.x, dy = e.touches[0].clientY - touchStart.y; dpadState.right = dx > 15; dpadState.left = dx < -15; dpadState.down = dy > 15; dpadState.up = dy < -15; }, { passive: false });
canvas.addEventListener('touchend', () => { dpadState.up = dpadState.down = dpadState.left = dpadState.right = false; touchStart = null; });

function loop() { update(); draw(); requestAnimationFrame(loop); }
generateMaze();
loop();
</script>
</body>
</html>
