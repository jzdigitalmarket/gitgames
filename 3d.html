<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambiente 3D - Primeira e Terceira Pessoa</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #ui-instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            max-width: 300px;
        }
        h3 { margin: 0 0 10px 0; color: #00ffcc; }
        ul { margin: 0; padding-left: 20px; }
        li { margin-bottom: 5px; }
        
        /* Botão de Alternar Câmera */
        #btn-camera {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #111;
            background-color: #00ffcc;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.4);
            transition: all 0.2s ease;
            z-index: 10;
        }
        #btn-camera:hover {
            background-color: #00b399;
            box-shadow: 0 4px 20px rgba(0, 255, 204, 0.6);
            transform: translateX(-50%) scale(1.05);
        }
        
        /* Mira central para a Primeira Pessoa */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(0, 255, 204, 0.7);
            border-radius: 50%;
            pointer-events: none;
            display: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-instructions">
        <h3>Controles do Jogo</h3>
        <div id="controls-text">
            <ul>
                <li><strong>W, A, S, D</strong>: Mover o Jogador</li>
                <li><strong>Clique + Arraste</strong>: Girar Câmera</li>
                <li><strong>Scroll</strong>: Zoom</li>
            </ul>
        </div>
    </div>

    <button id="btn-camera">Mudar para 1ª Pessoa</button>
    <div id="crosshair"></div>

    <div id="canvas-container"></div>

    <script>
        // --- CONFIGURAÇÃO DA CENA ---
        const container = document.getElementById('canvas-container');
        const btnCamera = document.getElementById('btn-camera');
        const crosshair = document.getElementById('crosshair');
        const controlsText = document.getElementById('controls-text');
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.015);

        // --- CÂMERA ---
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // Estado da câmera: '3P' (Terceira Pessoa) ou '1P' (Primeira Pessoa)
        let cameraMode = '3P'; 

        // --- RENDERIZADOR ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- CONTROLES TERCEIRA PESSOA (OrbitControls) ---
        const orbitControls = new THREE.OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.05;
        orbitControls.maxPolarAngle = Math.PI / 2 - 0.05;
        
        // Posição inicial da câmera 3P
        camera.position.set(0, 15, 25);

        // --- VARIÁVEIS PARA PRIMEIRA PESSOA (Mouse Look) ---
        let fpPitch = 0; // Rotação para cima/baixo (Olhar vertical)
        let fpYaw = 0;   // Rotação para os lados (Olhar horizontal)
        const mouseSensitivity = 0.002;

        // --- ILUMINAÇÃO ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- CENÁRIO E OBSTÁCULOS ---
        const floorGeo = new THREE.PlaneGeometry(60, 60);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x222831, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const grid = new THREE.GridHelper(60, 30, 0x00ffcc, 0x444444);
        grid.position.y = 0.01;
        scene.add(grid);

        const obstaclesBoxes = [];
        const obstacleGeo = new THREE.BoxGeometry(3, 6, 3);
        const obstacleMat = new THREE.MeshStandardMaterial({ color: 0x393e46, roughness: 0.5 });
        
        for(let i = 0; i < 15; i++) {
            const obstacle = new THREE.Mesh(obstacleGeo, obstacleMat);
            let x = (Math.random() - 0.5) * 44;
            let z = (Math.random() - 0.5) * 44;
            while(Math.abs(x) < 6 && Math.abs(z) < 6) {
                x = (Math.random() - 0.5) * 44;
                z = (Math.random() - 0.5) * 44;
            }
            obstacle.position.set(x, 3, z);
            obstacle.castShadow = true;
            obstacle.receiveShadow = true;
            scene.add(obstacle);

            const box = new THREE.Box3().setFromObject(obstacle);
            obstaclesBoxes.push(box);
        }

        // --- JOGADOR ---
        const playerGroup = new THREE.Group();

        const bodyGeo = new THREE.BoxGeometry(2, 2, 2);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x00adb5, roughness: 0.2, metalness: 0.5 });
        const playerBody = new THREE.Mesh(bodyGeo, bodyMat);
        playerBody.castShadow = true;
        playerGroup.add(playerBody);

        const visorGeo = new THREE.BoxGeometry(1.6, 0.4, 0.4);
        const visorMat = new THREE.MeshBasicMaterial({ color: 0xfff700 });
        const visor = new THREE.Mesh(visorGeo, visorMat);
        visor.position.set(0, 0.4, -1); // Face frontal original (-Z)
        playerGroup.add(visor);

        playerGroup.position.set(0, 1, 0);
        scene.add(playerGroup);

        const playerBox = new THREE.Box3();

        // --- TECLADO ---
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => { 
            const key = e.key.toLowerCase();
            if (key in keys) keys[key] = true; 
        });
        window.addEventListener('keyup', (e) => { 
            const key = e.key.toLowerCase();
            if (key in keys) keys[key] = false; 
        });

        // --- GERENCIAMENTO DE ALTERNÂNCIA DE CÂMERA ---
        btnCamera.addEventListener('click', () => {
            if (cameraMode === '3P') {
                // Ativa a Primeira Pessoa solicitando o travamento do ponteiro
                renderer.domElement.requestPointerLock();
            } else {
                document.exitPointerLock();
            }
        });

        // Evento que detecta se o ponteiro do mouse foi travado ou solto
        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === renderer.domElement) {
                // Entrou em Primeira Pessoa
                cameraMode = '1P';
                orbitControls.enabled = false;
                crosshair.style.display = 'block';
                btnCamera.textContent = 'Mudar para 3ª Pessoa';
                
                // Sincroniza a direção do olhar inicial 1P com a rotação atual do robô
                fpYaw = playerGroup.rotation.y + Math.PI; // Ajuste de ângulo de faceamento
                fpPitch = 0;
                
                controlsText.innerHTML = `
                    <ul>
                        <li><strong>W, A, S, D</strong>: Mover para Frente/Lados</li>
                        <li><strong>Movimentar Mouse</strong>: Olhar ao redor</li>
                        <li><strong>ESC</strong>: Sair da 1ª Pessoa</li>
                    </ul>
                `;
            } else {
                // Voltou para Terceira Pessoa
                cameraMode = '3P';
                orbitControls.enabled = true;
                crosshair.style.display = 'none';
                btnCamera.textContent = 'Mudar para 1ª Pessoa';
                
                // Recua a câmera para trás do player para não dar um tranco visual
                camera.position.set(playerGroup.position.x, playerGroup.position.y + 10, playerGroup.position.z + 20);
                orbitControls.target.copy(playerGroup.position);

                controlsText.innerHTML = `
                    <ul>
                        <li><strong>W, A, S, D</strong>: Mover o Jogador</li>
                        <li><strong>Clique + Arraste</strong>: Girar Câmera</li>
                        <li><strong>Scroll</strong>: Zoom</li>
                    </ul>
                `;
            }
        });

        // Captura o movimento do mouse para olhar em 1ª pessoa
        document.addEventListener('mousemove', (e) => {
            if (cameraMode !== '1P') return;

            fpYaw -= e.movementX * mouseSensitivity;
            fpPitch -= e.movementY * mouseSensitivity;

            // Limita o ângulo vertical (evita dar uma cambalhota com a cabeça)
            fpPitch = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, fpPitch));
        });

        // --- FUNÇÃO AUXILIAR DE COLISÃO ---
        function checkCollision(nextPosition) {
            playerBox.setFromObject(playerGroup);
            const currentPos = playerGroup.position;
            const translation = new THREE.Vector3().subVectors(nextPosition, currentPos);
            playerBox.translate(translation);

            for (let i = 0; i < obstaclesBoxes.length; i++) {
                if (playerBox.intersectsBox(obstaclesBoxes[i])) return true;
            }
            return false;
        }

        // --- LÓGICA DE MOVIMENTO E ATUALIZAÇÃO DE CÂMERA ---
        const moveSpeed = 0.15;

        function updateGame() {
            let inputX = 0;
            let inputZ = 0;

            if (keys.w) inputZ -= 1;
            if (keys.s) inputZ += 1;
            if (keys.a) inputX -= 1;
            if (keys.d) inputX += 1;

            if (cameraMode === '3P') {
                // --- MOVIMENTO EM 3ª PESSOA (Lógica Clássica) ---
                if (inputX !== 0 || inputZ !== 0) {
                    const direction = new THREE.Vector3(inputX, 0, inputZ).normalize();
                    
                    // Colisão por eixos (Deslizar)
                    const nextPosX = playerGroup.position.clone(); nextPosX.x += direction.x * moveSpeed;
                    if (!checkCollision(nextPosX)) playerGroup.position.x = nextPosX.x;

                    const nextPosZ = playerGroup.position.clone(); nextPosZ.z += direction.z * moveSpeed;
                    if (!checkCollision(nextPosZ)) playerGroup.position.z = nextPosZ.z;

                    // Rotaciona o robô suavemente para encarar a direção da corrida
                    const targetAngle = Math.atan2(direction.x, direction.z);
                    let diff = targetAngle - playerGroup.rotation.y;
                    diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                    playerGroup.rotation.y += diff * 0.2;
                }
                
                // Atualiza o ponto focal dos controles da câmera 3P
                orbitControls.target.copy(playerGroup.position);
                
            } else {
                // --- MOVIMENTO EM 1ª PESSOA (Estilo FPS) ---
                // Na primeira pessoa, a rotação do corpo do jogador segue rigidamente o Yaw do mouse
                playerGroup.rotation.y = fpYaw - Math.PI;

                if (inputX !== 0 || inputZ !== 0) {
                    // Direção do movimento baseada na orientação atual do jogador
                    const moveVector = new THREE.Vector3(inputX, 0, inputZ).normalize();
                    // Aplica a rotação do corpo para mover em relação a onde ele está olhando
                    moveVector.applyQuaternion(playerGroup.quaternion);

                    // Colisão deslizante em X e Z usando o vetor rotacionado
                    const nextPosX = playerGroup.position.clone(); nextPosX.x += moveVector.x * moveSpeed;
                    if (!checkCollision(nextPosX)) playerGroup.position.x = nextPosX.x;

                    const nextPosZ = playerGroup.position.clone(); nextPosZ.z += moveVector.z * moveSpeed;
                    if (!checkCollision(nextPosZ)) playerGroup.position.z = nextPosZ.z;
                }

                // Posiciona a câmera exatamente nos "olhos" do robô (dentro do grupo do jogador)
                camera.position.copy(playerGroup.position);
                camera.position.y += 0.4; // Ajuste de altura para a linha do visor
                
                // Calcula para onde a câmera está olhando baseado no Pitch e Yaw acumulados do mouse
                const target = new THREE.Vector3(0, 0, -1);
                const euler = new THREE.Euler(fpPitch, fpYaw, 0, 'YXZ');
                target.applyEuler(euler);
                target.add(camera.position);
                
                camera.lookAt(target);
            }

            // Limites do mapa (60x60)
            playerGroup.position.x = Math.max(-29, Math.min(29, playerGroup.position.x));
            playerGroup.position.z = Math.max(-29, Math.min(29, playerGroup.position.z));
        }

        // --- LOOP PRINCIPAL ---
        function animate() {
            requestAnimationFrame(animate);
            updateGame();
            if (cameraMode === '3P') orbitControls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
