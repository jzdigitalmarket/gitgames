<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambiente 3D Interativo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #ui-instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h3 { margin: 0 0 10px 0; color: #00ffcc; }
        ul { margin: 0; padding-left: 20px; }
        li { margin-bottom: 5px; }
    </style>
    <!-- Importando o Three.js e o OrbitControls para a câmera -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-instructions">
        <h3>Controles do Jogo</h3>
        <ul>
            <li><strong>W, A, S, D</strong> ou <strong>Setas</strong>: Mover o Jogador</li>
            <li><strong>Clique + Arraste o Mouse</strong>: Girar a Câmera</li>
            <li><strong>Scroll do Mouse</strong>: Zoom</li>
        </ul>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- CONFIGURAÇÃO DA CENA ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.015);

        // --- CÂMERA ---
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 25);

        // --- RENDERIZADOR ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- CONTROLES DE CÂMERA (MOUSE) ---
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Evita que a câmera passe para baixo do chão

        // --- ILUMINAÇÃO ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 100;
        const d = 30;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        scene.add(dirLight);

        // --- CENÁRIO (CHÃO E OBSTÁCULOS) ---
        // Chão principal
        const floorGeo = new THREE.PlaneGeometry(60, 60);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x222831, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Grade de referência no chão
        const grid = new THREE.GridHelper(60, 30, 0x00ffcc, 0x444444);
        grid.position.y = 0.01; // Levemente acima do chão para evitar flickering
        scene.add(grid);

        // Alguns obstáculos aleatórios na arena
        const obstacleGeo = new THREE.BoxGeometry(3, 6, 3);
        const obstacleMat = new THREE.MeshStandardMaterial({ color: 0x393e46, roughness: 0.5 });
        
        for(let i = 0; i < 8; i++) {
            const obstacle = new THREE.Mesh(obstacleGeo, obstacleMat);
            obstacle.position.x = (Math.random() - 0.5) * 40;
            obstacle.position.z = (Math.random() - 0.5) * 40;
            obstacle.position.y = 3; // Metade da altura para apoiar no chão
            obstacle.castShadow = true;
            obstacle.receiveShadow = true;
            scene.add(obstacle);
        }

        // --- JOGADOR ---
        // Grupo para conter o corpo e os olhos (direcionamento)
        const playerGroup = new THREE.Group();

        // Corpo do jogador
        const bodyGeo = new THREE.BoxGeometry(2, 2, 2);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x00adb5, roughness: 0.2, metalness: 0.5 });
        const playerBody = new THREE.Mesh(bodyGeo, bodyMat);
        playerBody.castShadow = true;
        playerGroup.add(playerBody);

        // "Olhos" ou visor para saber para onde ele está olhando
        const visorGeo = new THREE.BoxGeometry(1.6, 0.4, 0.4);
        const visorMat = new THREE.MeshBasicMaterial({ color: 0xfff700 });
        const visor = new THREE.Mesh(visorGeo, visorMat);
        visor.position.set(0, 0.4, -1); // Posicionado na face frontal (-Z)
        playerGroup.add(visor);

        playerGroup.position.y = 1; // Alinha a base ao chão
        scene.add(playerGroup);

        // --- SISTEMA DE ENTRADA DO TECLADO ---
        const keys = {
            w: false, a: false, s: false, d: false,
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false
        };

        window.addEventListener('keydown', (e) => {
            if (e.key in keys) keys[e.key] = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.key in keys) keys[e.key] = false;
        });

        // --- FÍSICA E MOVIMENTAÇÃO SIMPLES ---
        const moveSpeed = 0.15;
        const playerVelocity = new THREE.Vector3();

        function updateMovement() {
            let moveX = 0;
            let moveZ = 0;

            // Mapeando inputs
            if (keys.w || keys.ArrowUp) moveZ -= 1;
            if (keys.s || keys.ArrowDown) moveZ += 1;
            if (keys.a || keys.ArrowLeft) moveX -= 1;
            if (keys.d || keys.ArrowRight) moveX += 1;

            if (moveX !== 0 || moveZ !== 0) {
                // Criar vetor de direção baseado no input
                const direction = new THREE.Vector3(moveX, 0, moveZ).normalize();
                
                // Mover o jogador
                playerGroup.position.addScaledVector(direction, moveSpeed);

                // Rotacionar suavemente o jogador para olhar na direção do movimento
                const targetAngle = Math.atan2(direction.x, direction.z);
                
                // Interpolação suave de rotação (slerp manual para o ângulo Y)
                let diff = targetAngle - playerGroup.rotation.y;
                // Normaliza a diferença entre -PI e PI
                diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                playerGroup.rotation.y += diff * 0.2;
            }

            // Limites da arena (não deixar sair do mapa de 60x60)
            playerGroup.position.x = Math.max(-29, Math.min(29, playerGroup.position.x));
            playerGroup.position.z = Math.max(-29, Math.min(29, playerGroup.position.z));
            
            // Fazer a câmera seguir sutilmente o alvo (opcional, mantendo o controle do mouse ativo)
            // Se preferir câmera fixa estilo RPG, descomente a linha abaixo:
            // controls.target.copy(playerGroup.position);
        }

        // --- LOOP DE ANIMAÇÃO ---
        function animate() {
            requestAnimationFrame(animate);

            updateMovement();
            controls.update(); // Necessário para o efeito damping da câmera
            
            renderer.render(scene, camera);
        }

        // --- AJUSTE DE TELA (RESIZE) ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Inicia o loop
        animate();
    </script>
</body>
</html>
