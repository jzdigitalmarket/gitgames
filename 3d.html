<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambiente 3D - Sistema de Tiros</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #ui-instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            max-width: 300px;
        }
        h3 { margin: 0 0 10px 0; color: #00ffcc; }
        ul { margin: 0; padding-left: 20px; }
        li { margin-bottom: 5px; }
        
        #btn-camera {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #111;
            background-color: #00ffcc;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.4);
            transition: all 0.2s ease;
            z-index: 10;
        }
        #btn-camera:hover {
            background-color: #00b399;
            box-shadow: 0 4px 20px rgba(0, 255, 204, 0.6);
            transform: translateX(-50%) scale(1.05);
        }
        
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            transform: translate(-50%, -50%);
            border: 2px solid #ff0055;
            border-radius: 50%;
            pointer-events: none;
            display: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-instructions">
        <h3>Controles do Jogo</h3>
        <div id="controls-text">
            <ul>
                <li><strong>W, A, S, D</strong>: Mover o Jogador</li>
                <li><strong>BARRA DE ESPAÇO</strong>: Atirar!</li>
                <li><strong>Clique + Arraste</strong>: Girar Câmera</li>
                <li><strong>Scroll</strong>: Zoom</li>
            </ul>
        </div>
    </div>

    <button id="btn-camera">Mudar para 1ª Pessoa</button>
    <div id="crosshair"></div>

    <div id="canvas-container"></div>

    <script>
        // --- CONFIGURAÇÃO DA CENA ---
        const container = document.getElementById('canvas-container');
        const btnCamera = document.getElementById('btn-camera');
        const crosshair = document.getElementById('crosshair');
        const controlsText = document.getElementById('controls-text');
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.015);

        // --- CÂMERA E MODO ---
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        let cameraMode = '3P'; 

        // --- RENDERIZADOR ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- CONTROLES TERCEIRA PESSOA ---
        const orbitControls = new THREE.OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.05;
        orbitControls.maxPolarAngle = Math.PI / 2 - 0.05;
        camera.position.set(0, 15, 25);

        // --- VARIÁVEIS PRIMEIRA PESSOA ---
        let fpPitch = 0; 
        let fpYaw = 0;   
        const mouseSensitivity = 0.002;

        // --- ILUMINAÇÃO ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- CENÁRIO ---
        const floorGeo = new THREE.PlaneGeometry(60, 60);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x222831, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const grid = new THREE.GridHelper(60, 30, 0x00ffcc, 0x444444);
        grid.position.y = 0.01;
        scene.add(grid);

        // --- LISTA DE OBSTÁCULOS COM VIDA ---
        const obstacles = []; // Guardará objetos estruturados { mesh, box, life }
        const obstacleGeo = new THREE.BoxGeometry(3, 6, 3);
        
        for(let i = 0; i < 15; i++) {
            // Material único para cada um poder piscar independentemente ao levar tiro
            const obstacleMat = new THREE.MeshStandardMaterial({ color: 0x393e46, roughness: 0.5 });
            const mesh = new THREE.Mesh(obstacleGeo, obstacleMat);
            
            let x = (Math.random() - 0.5) * 44;
            let z = (Math.random() - 0.5) * 44;
            while(Math.abs(x) < 6 && Math.abs(z) < 6) {
                x = (Math.random() - 0.5) * 44;
                z = (Math.random() - 0.5) * 44;
            }
            mesh.position.set(x, 3, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);

            const box = new THREE.Box3().setFromObject(mesh);
            obstacles.push({
                mesh: mesh,
                box: box,
                life: 3, // Precisa de 3 tiros para quebrar
                hitTimer: 0
            });
        }

        // --- JOGADOR ---
        const playerGroup = new THREE.Group();

        const bodyGeo = new THREE.BoxGeometry(2, 2, 2);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x00adb5, roughness: 0.2, metalness: 0.5 });
        const playerBody = new THREE.Mesh(bodyGeo, bodyMat);
        playerBody.castShadow = true;
        playerGroup.add(playerBody);

        const visorGeo = new THREE.BoxGeometry(1.6, 0.4, 0.4);
        const visorMat = new THREE.MeshBasicMaterial({ color: 0xfff700 });
        const visor = new THREE.Mesh(visorGeo, visorMat);
        visor.position.set(0, 0.4, -1);
        playerGroup.add(visor);

        playerGroup.position.set(0, 1, 0);
        scene.add(playerGroup);

        const playerBox = new THREE.Box3();

        // --- ARSENAL DE TIROS (LASERS) ---
        const lasers = [];
        const laserSpeed = 0.6;
        const laserGeo = new THREE.CylinderGeometry(0.1, 0.1, 1.5, 8);
        laserGeo.rotateX(Math.PI / 2); // Deita o cilindro para apontar para a frente
        const laserMat = new THREE.MeshBasicMaterial({ color: 0xff0055 });

        function fireLaser() {
            const laserMesh = new THREE.Mesh(laserGeo, laserMat);
            const direction = new THREE.Vector3();

            if (cameraMode === '3P') {
                // Em 3P, atira para onde o robô está virado (Eixo Z local negativo)
                laserMesh.position.copy(playerGroup.position);
                laserMesh.position.y += 0.4; // Altura do visor
                
                // Pega a direção global para onde a frente do robô aponta
                playerGroup.getWorldDirection(direction);
                direction.negate(); // Inverte porque o Three.js considera +Z como a "traseira" do objeto
                
                // Rotaciona o laser para alinhar com a direção do tiro
                laserMesh.rotation.copy(playerGroup.rotation);
            } else {
                // Em 1P, atira exatamente para onde a câmera está olhando
                laserMesh.position.copy(camera.position);
                
                camera.getWorldDirection(direction);
                
                // Alinha o laser com a rotação da câmera
                laserMesh.quaternion.copy(camera.quaternion);
            }

            // Adiciona na cena e na nossa lista de rastreamento
            scene.add(laserMesh);
            lasers.push({
                mesh: laserMesh,
                dir: direction.normalize(),
                box: new THREE.Box3()
            });
        }

    // --- TECLADO ---
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => { 
            const key = e.key.toLowerCase();
            if (key in keys) keys[key] = true; 
            
            // Gatilho do tiro na Barra de Espaço
            if (e.key === " " || e.code === "Space") {
                e.preventDefault(); // <-- ISSO AQUI EVITA QUE O NAVEGADOR PERDA O FOCO OU ROLLE A PÁGINA
                fireLaser();
            }
        });
        window.addEventListener('keyup', (e) => { 
            const key = e.key.toLowerCase();
            if (key in keys) keys[key] = false; 
            
            // Também evita o comportamento ao soltar a tecla, por segurança
            if (e.key === " " || e.code === "Space") {
                e.preventDefault();
            }
        });

        // --- ALTERNÂNCIA DE CÂMERA ---
        btnCamera.addEventListener('click', () => {
            if (cameraMode === '3P') renderer.domElement.requestPointerLock();
            else document.exitPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === renderer.domElement) {
                cameraMode = '1P';
                orbitControls.enabled = false;
                crosshair.style.display = 'block';
                btnCamera.textContent = 'Mudar para 3ª Pessoa';
                fpYaw = playerGroup.rotation.y + Math.PI;
                fpPitch = 0;
                
                controlsText.innerHTML = `
                    <ul>
                        <li><strong>W, A, S, D</strong>: Mover o Robô</li>
                        <li><strong>ESPAÇO</strong>: Atirar!</li>
                        <li><strong>Mouse</strong>: Olhar ao redor</li>
                        <li><strong>ESC</strong>: Sair da 1ª Pessoa</li>
                    </ul>
                `;
            } else {
                cameraMode = '3P';
                orbitControls.enabled = true;
                crosshair.style.display = 'none';
                btnCamera.textContent = 'Mudar para 1ª Pessoa';
                camera.position.set(playerGroup.position.x, playerGroup.position.y + 10, playerGroup.position.z + 20);
                orbitControls.target.copy(playerGroup.position);

                controlsText.innerHTML = `
                    <ul>
                        <li><strong>W, A, S, D</strong>: Mover o Jogador</li>
                        <li><strong>BARRA DE ESPAÇO</strong>: Atirar!</li>
                        <li><strong>Clique + Arraste</strong>: Girar Câmera</li>
                        <li><strong>Scroll</strong>: Zoom</li>
                    </ul>
                `;
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (cameraMode !== '1P') return;
            fpYaw -= e.movementX * mouseSensitivity;
            fpPitch -= e.movementY * mouseSensitivity;
            fpPitch = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, fpPitch));
        });

        // --- VERIFICAÇÃO DE COLISÃO DO JOGADOR ---
        function checkPlayerCollision(nextPosition) {
            playerBox.setFromObject(playerGroup);
            const currentPos = playerGroup.position;
            const translation = new THREE.Vector3().subVectors(nextPosition, currentPos);
            playerBox.translate(translation);

            for (let i = 0; i < obstacles.length; i++) {
                if (playerBox.intersectsBox(obstacles[i].box)) return true;
            }
            return false;
        }

        // --- SISTEMA DE ATUALIZAÇÃO DOS TIROS ---
        function updateLasers() {
            // Varre a lista de trás para frente para poder remover elementos sem quebrar o loop
            for (let i = lasers.length - 1; i >= 0; i--) {
                const laser = lasers[i];
                
                // Move o laser para a direção do tiro
                laser.mesh.position.addScaledVector(laser.dir, laserSpeed);
                
                // Atualiza a Bounding Box do laser
                laser.box.setFromObject(laser.mesh);

                let hitSomething = false;

                // Testa colisão com cada obstáculo ativo
                for (let j = obstacles.length - 1; j >= 0; j--) {
                    const obs = obstacles[j];
                    
                    if (laser.box.intersectsBox(obs.box)) {
                        hitSomething = true;
                        obs.life -= 1;
                        obs.hitTimer = 5; // Faz piscar por 5 frames
                        
                        // Se a vida do bloco zerar, remove ele do jogo
                        if (obs.life <= 0) {
                            scene.remove(obs.mesh);
                            obstacles.splice(j, 1);
                        }
                        break;
                    }
                }

                // Remove o laser se ele colidir ou se voar para muito longe (fora do mapa)
                if (hitSomething || laser.mesh.position.length() > 80) {
                    scene.remove(laser.mesh);
                    lasers.splice(i, 1);
                }
            }

            // Gerencia o efeito visual de piscar dos blocos atingidos
            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                if (obs.hitTimer > 0) {
                    obs.hitTimer--;
                    obs.mesh.material.color.setHex(0xff0000); // Fica vermelho
                } else {
                    obs.mesh.material.color.setHex(0x393e46); // Volta à cor padrão
                }
            }
        }

        // --- MOVIMENTAÇÃO DO AVATAR ---
        const moveSpeed = 0.15;

        function updateGame() {
            let inputX = 0;
            let inputZ = 0;

            if (keys.w) inputZ -= 1;
            if (keys.s) inputZ += 1;
            if (keys.a) inputX -= 1;
            if (keys.d) inputX += 1;

            if (cameraMode === '3P') {
                if (inputX !== 0 || inputZ !== 0) {
                    const direction = new THREE.Vector3(inputX, 0, inputZ).normalize();
                    
                    const nextPosX = playerGroup.position.clone(); nextPosX.x += direction.x * moveSpeed;
                    if (!checkPlayerCollision(nextPosX)) playerGroup.position.x = nextPosX.x;

                    const nextPosZ = playerGroup.position.clone(); nextPosZ.z += direction.z * moveSpeed;
                    if (!checkPlayerCollision(nextPosZ)) playerGroup.position.z = nextPosZ.z;

                    const targetAngle = Math.atan2(direction.x, direction.z);
                    let diff = targetAngle - playerGroup.rotation.y;
                    diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                    playerGroup.rotation.y += diff * 0.2;
                }
                orbitControls.target.copy(playerGroup.position);
            } else {
                playerGroup.rotation.y = fpYaw - Math.PI;

                if (inputX !== 0 || inputZ !== 0) {
                    const moveVector = new THREE.Vector3(inputX, 0, inputZ).normalize();
                    moveVector.applyQuaternion(playerGroup.quaternion);

                    const nextPosX = playerGroup.position.clone(); nextPosX.x += moveVector.x * moveSpeed;
                    if (!checkPlayerCollision(nextPosX)) playerGroup.position.x = nextPosX.x;

                    const nextPosZ = playerGroup.position.clone(); nextPosZ.z += moveVector.z * moveSpeed;
                    if (!checkPlayerCollision(nextPosZ)) playerGroup.position.z = nextPosZ.z;
                }

                camera.position.copy(playerGroup.position);
                camera.position.y += 0.4; 
                
                const target = new THREE.Vector3(0, 0, -1);
                const euler = new THREE.Euler(fpPitch, fpYaw, 0, 'YXZ');
                target.applyEuler(euler);
                target.add(camera.position);
                camera.lookAt(target);
            }

            playerGroup.position.x = Math.max(-29, Math.min(29, playerGroup.position.x));
            playerGroup.position.z = Math.max(-29, Math.min(29, playerGroup.position.z));
            
            // Atualiza os projéteis na tela
            updateLasers();
        }

        // --- LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            updateGame();
            if (cameraMode === '3P') orbitControls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
