<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambiente 3D Interativo com Colisões</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #ui-instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h3 { margin: 0 0 10px 0; color: #00ffcc; }
        ul { margin: 0; padding-left: 20px; }
        li { margin-bottom: 5px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-instructions">
        <h3>Controles do Jogo</h3>
        <ul>
            <li><strong>W, A, S, D</strong> ou <strong>Setas</strong>: Mover o Jogador</li>
            <li><strong>Clique + Arraste o Mouse</strong>: Girar a Câmera</li>
            <li><strong>Scroll do Mouse</strong>: Zoom</li>
            <li><em>O jogador agora bate e desliza nos obstáculos!</em></li>
        </ul>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- CONFIGURAÇÃO DA CENA ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.015);

        // --- CÂMERA ---
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 25);

        // --- RENDERIZADOR ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- CONTROLES DE CÂMERA ---
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05;

        // --- ILUMINAÇÃO ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- CENÁRIO E OBSTÁCULOS ---
        const floorGeo = new THREE.PlaneGeometry(60, 60);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x222831, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const grid = new THREE.GridHelper(60, 30, 0x00ffcc, 0x444444);
        grid.position.y = 0.01;
        scene.add(grid);

        // Array para guardar as caixas de colisão dos obstáculos
        const obstaclesBoxes = [];

        const obstacleGeo = new THREE.BoxGeometry(3, 6, 3);
        const obstacleMat = new THREE.MeshStandardMaterial({ color: 0x393e46, roughness: 0.5 });
        
        for(let i = 0; i < 12; i++) {
            const obstacle = new THREE.Mesh(obstacleGeo, obstacleMat);
            
            // Evita gerar obstáculos colados na posição inicial do jogador (0,0)
            let x = (Math.random() - 0.5) * 40;
            let z = (Math.random() - 0.5) * 40;
            while(Math.abs(x) < 5 && Math.abs(z) < 5) {
                x = (Math.random() - 0.5) * 40;
                z = (Math.random() - 0.5) * 40;
            }

            obstacle.position.set(x, 3, z);
            obstacle.castShadow = true;
            obstacle.receiveShadow = true;
            scene.add(obstacle);

            // Criar e computar a Bounding Box do obstáculo estático
            const box = new THREE.Box3().setFromObject(obstacle);
            obstaclesBoxes.push(box);
        }

        // --- JOGADOR ---
        const playerGroup = new THREE.Group();

        const bodyGeo = new THREE.BoxGeometry(2, 2, 2);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x00adb5, roughness: 0.2, metalness: 0.5 });
        const playerBody = new THREE.Mesh(bodyGeo, bodyMat);
        playerBody.castShadow = true;
        playerGroup.add(playerBody);

        const visorGeo = new THREE.BoxGeometry(1.6, 0.4, 0.4);
        const visorMat = new THREE.MeshBasicMaterial({ color: 0xfff700 });
        const visor = new THREE.Mesh(visorGeo, visorMat);
        visor.position.set(0, 0.4, -1);
        playerGroup.add(visor);

        playerGroup.position.set(0, 1, 0);
        scene.add(playerGroup);

        // Criar a caixa de colisão dinâmica para o jogador
        const playerBox = new THREE.Box3();

        // --- TECLADO ---
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        window.addEventListener('keydown', (e) => { if (e.key in keys) keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { if (e.key in keys) keys[e.key] = false; });

        // --- LÓGICA DE MOVIMENTO COM DETECÇÃO DE COLISÃO ---
        const moveSpeed = 0.15;

        function checkCollision(nextPosition) {
            // Cria uma cópia temporária da caixa do jogador posicionada onde ele *pretende* ir
            playerBox.setFromObject(playerGroup);
            
            // Movemos a caixa de simulação para a nova coordenada calculada
            const currentPos = playerGroup.position;
            const translation = new THREE.Vector3().subVectors(nextPosition, currentPos);
            playerBox.translate(translation);

            // Compara com todos os obstáculos do cenário
            for (let i = 0; i < obstaclesBoxes.length; i++) {
                if (playerBox.intersectsBox(obstaclesBoxes[i])) {
                    return true; // Houve choque!
                }
            }
            return false; // Caminho livre
        }

        function updateMovement() {
            let moveX = 0;
            let moveZ = 0;

            if (keys.w || keys.ArrowUp) moveZ -= 1;
            if (keys.s || keys.ArrowDown) moveZ += 1;
            if (keys.a || keys.ArrowLeft) moveX -= 1;
            if (keys.d || keys.ArrowRight) moveX += 1;

            if (moveX !== 0 || moveZ !== 0) {
                const direction = new THREE.Vector3(moveX, 0, moveZ).normalize();
                
                // --- AJUSTE DE COLISÃO POR EIXO (Slide Collision) ---
                // Testamos o movimento no Eixo X separadamente
                const nextPosX = playerGroup.position.clone();
                nextPosX.x += direction.x * moveSpeed;
                if (!checkCollision(nextPosX)) {
                    playerGroup.position.x = nextPosX.x;
                }

                // Testamos o movimento no Eixo Z separadamente
                const nextPosZ = playerGroup.position.clone();
                nextPosZ.z += direction.z * moveSpeed;
                if (!checkCollision(nextPosZ)) {
                    playerGroup.position.z = nextPosZ.z;
                }

                // Rotacionar o visor para a direção do movimento
                const targetAngle = Math.atan2(direction.x, direction.z);
                let diff = targetAngle - playerGroup.rotation.y;
                diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                playerGroup.rotation.y += diff * 0.2;
            }

            // Limites da arena
            playerGroup.position.x = Math.max(-29, Math.min(29, playerGroup.position.x));
            playerGroup.position.z = Math.max(-29, Math.min(29, playerGroup.position.z));
        }

        // --- LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            updateMovement();
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
